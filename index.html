<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>売上計算機</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:15px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:10px;
}

.summary{
text-align:center;
margin-bottom:20px;
}

.summary .big{
font-size:42px;
font-weight:bold;
}

.row{
border-bottom:1px solid #ddd;
padding:15px 0;
}

.name{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

input{
font-size:20px;
padding:8px;
border:1px solid #ccc;
border-radius:8px;
}

.g{
width:120px;
}

.amount{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.freebox{
border-bottom:1px solid #ddd;
padding:15px 0;
}

.freebox input{
width:28%;
margin-right:2%;
}

.totalline{
height:3px;
background:#cfcfcf;
margin:15px auto;
}

</style>
</head>

<body>

<div class="card">

<h1>売上計算機</h1>

<div class="summary">
<div>総グラム</div>
<div class="big" id="totalGram">0g</div>

<div style="margin-top:15px;">総売上</div>
<div class="big" id="totalSale">0円</div>
</div>

<button onclick="resetAll()" class="resetBtn">
リセット
</button>

<div class="totalline"></div>

<div id="list"></div>

<h2 style="margin-top:25px;">自由入力</h2>

<div id="freeArea"></div>


</div>

<script>

const items = [

["K24IN",23558],
["K24",23116],
["K22",21141],
["K21.6",20685],
["K20",19176],
["K18",17645],
["K14",13225],
["K10",9281],
["K9",8205],

["K18WG",17612],
["K14WG",13275],

["PT1000IN",9212],
["PT1000",9058],
["PT950",8643],
["PT900",8766],
["PT850",8305],

["900/18 9:1",16588],
["900/18 8:2",15624],
["900/18 7:3",14689],
["900/18 6:4",13753],
["900/18 5:5",12859],
["900/18 4:6",11883],
["900/18 3:7",10947],
["900/18 2:8",10012],
["900/18 1:9",9122],

["850/18 9:1",16572],
["850/18 8:2",15532],
["850/18 7:3",14551],
["850/18 6:4",13569],
["850/18 5:5",12629],
["850/18 4:6",11606],
["850/18 3:7",10625],
["850/18 2:8",9643],
["850/18 1:9",8708],

["SV1000",336],
["SV925",300]

];

const list = document.getElementById("list");

items.forEach((item,i)=>{

list.innerHTML += `

<div class="row">

<div class="name">
${item[0]}　${item[1].toLocaleString()}円
</div>

<div style="margin-top:10px;">

<input
class="g"
type="number"
step="0.1"
placeholder="g"
id="g${i}"
oninput="calc()">

</div>

<div class="amount" id="a${i}">
売上 0円
</div>

</div>

`;

});

const freeArea = document.getElementById("freeArea");

for(let i=0;i<5;i++){

freeArea.innerHTML += `

<div class="freebox">

<input
type="text"
placeholder="金種"
id="fname${i}">

<input
type="number"
placeholder="単価"
id="fprice${i}"
oninput="calc()">

<input
type="number"
placeholder="g"
id="fgram${i}"
oninput="calc()">

<div
class="amount"
id="fa${i}">
売上 0円
</div>

</div>

`;

}

function calc(){

let totalSale = 0;
let totalGram = 0;

items.forEach((item,i)=>{

const g =
parseFloat(
document.getElementById(`g${i}`).value
) || 0;

const sale =
Math.round(item[1] * g);

document.getElementById(`a${i}`).innerHTML =
`売上 ${sale.toLocaleString()}円`;

totalSale += sale;
totalGram += g;

});

for(let i=0;i<5;i++){

const price =
parseFloat(
document.getElementById(`fprice${i}`).value
) || 0;

const gram =
parseFloat(
document.getElementById(`fgram${i}`).value
) || 0;

const sale =
Math.round(price * gram);

document.getElementById(`fa${i}`).innerHTML =
`売上 ${sale.toLocaleString()}円`;

totalSale += sale;
totalGram += gram;

}

document.getElementById("totalSale").innerHTML =
`${totalSale.toLocaleString()}円`;

document.getElementById("totalGram").innerHTML =
`${totalGram.toFixed(1)}g`;

}

function resetAll(){

  if(!confirm("本当にすべての入力をリセットしますか？")){
    return;
  }

  document.querySelectorAll("input").forEach(input=>{
    input.value="";
  });

  calc();

}

</script>

</body>
</html>
